<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Split Loader Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
    }

    /* Scroll lock class toggled by JS while the loader runs */
    html.loader-active,
    body.loader-active {
      overflow: hidden;
      height: 100%;
    }

    .loader-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      pointer-events: none;
    }

    .loader-half {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background-color: #000;
      will-change: transform;
    }

    .loader-half--left {
      left: 0;
    }

    .loader-half--right {
      right: 0;
    }

    .loader-text {
      position: relative;
      z-index: 1;
      margin: 0;
      padding: 0 1.5rem;
      color: #ffffff;
      text-align: center;
      font-family: "Cinzel", Georgia, "Times New Roman", serif;
      font-weight: 900;
      font-style: normal;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: clamp(2.25rem, 9vw, 7rem);
      line-height: 1.05;
      text-shadow: 0 2px 40px rgba(255, 255, 255, 0.18);
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .loader-text {
        white-space: normal;
        letter-spacing: 0.04em;
      }
    }

    .site-content {
      width: 100%;
      min-height: 100vh;
      visibility: hidden;
      /* fallback pre-JS state; GSAP takes over on load */
      opacity: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
    }

    .site-content h1 {
      font-size: clamp(2rem, 6vw, 4rem);
    }

    .site-content p {
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: #555;
    }
  </style>
</head>

<body>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
